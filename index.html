<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ELITE AUDIO ENGINE v1.1</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#020617">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="AudioElite">
    <link rel="apple-touch-icon" href="icon-192.png">

    <style>
        :root {
            --bg: #020617; --card: #1e293b; --primary: #aa98f8;
            --success: #22c55e; --error: #f43f5e; --text: #f1f5f9;
            --accent: #ec4899;
        }
        body { 
            font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--text); 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; margin: 0; overflow: hidden;
            touch-action: manipulation;
        }
        
        #audio-container { 
            background: var(--card); width: 92%; max-width: 380px; 
            height: 92vh; padding: 1.2rem; border-radius: 36px; 
            display: flex; flex-direction: column; align-items: center; 
            position: relative; border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 25px 60px rgba(0,0,0,0.6);
            box-sizing: border-box;
        }

        .title-logo { font-size: 1.6rem; font-weight: 900; margin-bottom: 0.8rem; letter-spacing: -1px; text-align: center;}
        
        /* データソースエリア */
        .storage-title { font-size: 0.75rem; color: #94a3b8; margin-bottom: 4px; font-weight: bold; width: 100%; text-align: left; }
        .storage-box { width: 100%; background: rgba(0,0,0,0.15); border-radius: 12px; padding: 8px; box-sizing: border-box; max-height: 80px; overflow-y: auto; margin-bottom: 8px; }
        .storage-item { background: rgba(255,255,255,0.05); padding: 8px 12px; border-radius: 8px; margin-bottom: 4px; font-size: 0.8rem; cursor: pointer; border: 1px solid transparent; }
        .storage-item.selected { background: rgba(170, 152, 248, 0.2) !important; border-color: var(--primary); }

        /* コピペ用入力エリア */
        .paste-container { width: 100%; display: flex; flex-direction: column; margin-bottom: 12px; position: relative; }
        .paste-textarea { 
            width: 100%; height: 55px; background: rgba(15, 23, 42, 0.6); border: 1px solid #334155; 
            color: white; padding: 8px; border-radius: 12px; font-size: 0.75rem; resize: none; box-sizing: border-box;
            font-family: inherit; transition: border-color 0.2s;
        }
        .paste-textarea:focus { border-color: var(--primary); outline: none; }
        .paste-textarea.active-input { border-color: var(--accent); background: rgba(236, 72, 153, 0.05); }
        .clear-btn { position: absolute; right: 8px; bottom: 6px; background: rgba(255,255,255,0.1); border: none; color: #94a3b8; font-size: 0.7rem; padding: 2px 6px; border-radius: 4px; cursor: pointer; }

        /* 状況表示ボード */
        .status-board {
            width: 100%; background: rgba(0,0,0,0.2); border-radius: 20px;
            padding: 15px; box-sizing: border-box; text-align: center;
            margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.05);
            flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center;
            min-height: 90px;
        }
        #current-track { font-size: 0.75rem; color: var(--primary); font-weight: bold; margin-bottom: 6px; }
        #now-playing { font-size: 1.4rem; font-weight: 800; line-height: 1.4; word-break: break-all; min-height: 3.5rem; display: flex; align-items: center; justify-content: center; }

        /* コントロール・設定エリア */
        .config-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; width: 100%; background: rgba(255,255,255,0.03); padding: 10px; border-radius: 20px; box-sizing: border-box; margin-bottom: 12px;}
        .config-item { display: flex; flex-direction: column; gap: 2px; font-size: 0.75rem; color: #94a3b8; }
        .config-item.full { grid-column: span 2; }
        .config-input, select { background: #0f172a; border: 1px solid #334155; color: white; padding: 5px; border-radius: 8px; width: 100%; box-sizing: border-box; font-size: 0.75rem; }
        
        .slider-container { display: flex; align-items: center; gap: 8px; }
        .slider-container input { flex-grow: 1; accent-color: var(--primary); }
        .slider-val { width: 25px; text-align: right; font-family: monospace; }

        /* 操作ボタン */
        .control-btn { width: 100%; background: linear-gradient(135deg, var(--primary), #818cf8); color: var(--bg); border: none; padding: 14px; border-radius: 16px; font-weight: 900; font-size: 1.1rem; cursor: pointer; transition: opacity 0.2s; }
        .control-btn.playing { background: linear-gradient(135deg, var(--error), #e11d48); color: white; }
    </style>
</head>
<body>

<div id="audio-container">
    <div class="title-logo">AUDIO<span style="color:var(--primary)">ELITE v1.1</span></div>

    <div class="storage-title">アプリ経由のデータソース</div>
    <div class="storage-box" id="saved-lists"></div>

    <div class="storage-title">または、ここにテキストをコピペ</div>
    <div class="paste-container">
        <textarea id="paste-input" class="paste-textarea" placeholder="問題/答え、または、通常の文章をペースト..." oninput="handlePasteInput()"></textarea>
        <button class="clear-btn" id="clear-btn" onclick="clearPasteInput()" style="display:none;">クリア</button>
    </div>

    <div class="status-board">
        <div id="current-track">STOPPED</div>
        <div id="now-playing">再生ボタンを押してください</div>
    </div>

    <div class="config-grid">
        <div class="config-item full">
            <span>声の種類 (ボイスキャスト)</span>
            <select id="voice-select"><option value="">システム標準音声</option></select>
        </div>
        <div class="config-item">
            <span>読み上げモード</span>
            <select id="play-mode">
                <option value="set">問題 ➔ 答え (セット)</option>
                <option value="q">問題（または単一テキスト）のみ</option>
                <option value="a">答えのみ</option>
            </select>
        </div>
        <div class="config-item">
            <span>次への間隔 (秒)</span>
            <input type="number" id="pause-sec" class="config-input" value="2" min="0" max="10">
        </div>
        <div class="config-item full">
            <span>速度 (Speed)</span>
            <div class="slider-container">
                <input type="range" id="val-speed" min="0.5" max="2" step="0.1" value="1.0" oninput="document.getElementById('lbl-speed').innerText=this.value">
                <span class="slider-val" id="lbl-speed">1.0</span>
            </div>
        </div>
        <div class="config-item full">
            <span>音程 (Pitch)</span>
            <div class="slider-container">
                <input type="range" id="val-pitch" min="0.5" max="1.5" step="0.1" value="1.0" oninput="document.getElementById('lbl-pitch').innerText=this.value">
                <span class="slider-val" id="lbl-pitch">1.0</span>
            </div>
        </div>
    </div>

    <button id="action-btn" class="control-btn" onclick="togglePlay()">START AUDIO</button>
</div>

<script>
let database = [];
let selectedStoredText = null;
let isPlaying = false;
let synth = window.speechSynthesis;
let voices = [];
let timeoutId = null;

window.onload = function() {
    renderSavedLists();
    loadVoices();
    if (synth.onvoiceschanged !== undefined) {
        synth.onvoiceschanged = loadVoices;
    }
};

function loadVoices() {
    voices = synth.getVoices();
    const select = document.getElementById('voice-select');
    select.innerHTML = '';
    
    voices.forEach((voice, index) => {
        const option = document.createElement('option');
        option.value = index;
        option.textContent = `${voice.name} (${voice.lang})`;
        if (voice.default) option.textContent += ' [Default]';
        select.appendChild(option);
    });
}

function renderSavedLists(disableHighlight = false) {
    const container = document.getElementById('saved-lists');
    container.innerHTML = '';
    
    const keys = Object.keys(localStorage).filter(k => k.startsWith('eq_data_'));
    
    if(keys.length === 0) {
        container.innerHTML = '<div style="font-size:0.75rem; opacity:0.5; text-align:center; padding:10px;">クイズ側でデータを保存してください</div>';
        return;
    }

    keys.forEach((key, idx) => {
        try {
            const item = JSON.parse(localStorage.getItem(key));
            if (!item || !item.genre) return;

            const div = document.createElement('div');
            div.className = 'storage-item';
            
            if (!disableHighlight && (selectedStoredText === item.text || (!selectedStoredText && idx === 0))) {
                div.classList.add('selected'); 
                selectedStoredText = item.text;
                parseTextToDatabase(item.text);
            }
            div.innerHTML = `📂 ${item.genre} (${item.count}件)`;
            
            div.onclick = () => {
                if(isPlaying) stopAudio();
                
                document.getElementById('paste-input').value = '';
                document.getElementById('paste-input').classList.remove('active-input');
                document.getElementById('clear-btn').style.display = 'none';
                
                selectedStoredText = item.text;
                parseTextToDatabase(item.text);
                renderSavedLists(); 
            };
            container.appendChild(div);
        } catch(e) {}
    });
}

function handlePasteInput() {
    if(isPlaying) stopAudio();
    
    const inputTextArea = document.getElementById('paste-input');
    const text = inputTextArea.value;
    const clearBtn = document.getElementById('clear-btn');
    
    if (text.trim().length > 0) {
        inputTextArea.classList.add('active-input');
        clearBtn.style.display = 'block';
        selectedStoredText = null; 
        renderSavedLists(true);    
        parseTextToDatabase(text); 
    } else {
        clearPasteInput();
    }
}

function clearPasteInput() {
    if(isPlaying) stopAudio();
    
    document.getElementById('paste-input').value = '';
    document.getElementById('paste-input').classList.remove('active-input');
    document.getElementById('clear-btn').style.display = 'none';
    
    selectedStoredText = null;
    renderSavedLists(); 
}

// 【改良】通常の文章（コロンやスラッシュがない）でも1行ずつ処理できるようにパース処理を強化
function parseTextToDatabase(text) {
    database = [];
    if (!text || !text.trim()) return;

    // 1行ごとに分割（空行は除外）
    const lines = text.split('\n').map(s => s.trim()).filter(s => s);

    // 1. 「コロン(:)」形式の判定
    if (text.includes(':')) {
        text.split(':').map(s => s.trim()).filter(s => s).forEach(b => {
            const p = b.split(/[\/]+/).map(s => s.trim()).filter(s => s);
            if(p.length >= 2) {
                database.push({ q: p[0], a: p[1], isTextOnly: false });
            }
        });
        if(database.length > 0) return; // 処理が成功していれば終了
    }

    // 2. スラッシュ(/)による「問題/答え」判定
    // いずれかの行にスラッシュが含まれているか確認
    const hasSlash = lines.some(line => line.includes('/'));
    if (hasSlash) {
        lines.forEach(line => {
            const parts = line.split('/').map(s => s.trim()).filter(s => s);
            if (parts.length >= 2) {
                database.push({ q: parts[0], a: parts[1], isTextOnly: false });
            } else if (parts.length === 1) {
                // スラッシュのない行は通常の文字列として処理
                database.push({ q: parts[0], a: '', isTextOnly: true });
            }
        });
        return;
    }

    // 3. 【新機能】区切り文字がない通常の文章・文字列（改行区切り）
    // 1行1データ（1トラック）としてそのまま登録
    lines.forEach(line => {
        database.push({ q: line, a: '', isTextOnly: true });
    });
}

function togglePlay() {
    if (isPlaying) {
        stopAudio();
    } else {
        startAudio();
    }
}

function startAudio() {
    if (database.length === 0) {
        alert("読み上げるデータがありません。テキストを入力するかソースを選択してください。");
        return;
    }
    isPlaying = true;
    const btn = document.getElementById('action-btn');
    btn.innerText = "STOP AUDIO";
    btn.classList.add('playing');
    
    speakLoop();
}

function stopAudio() {
    isPlaying = false;
    synth.cancel();
    clearTimeout(timeoutId);
    
    const btn = document.getElementById('action-btn');
    btn.innerText = "START AUDIO";
    btn.classList.remove('playing');
    
    document.getElementById('current-track').innerText = "STOPPED";
    document.getElementById('now-playing').innerText = "一時停止しました";
}

function speakLoop() {
    if (!isPlaying) return;

    const randomIndex = Math.floor(Math.random() * database.length);
    const item = database[randomIndex];
    
    const mode = document.getElementById('play-mode').value;
    const speed = parseFloat(document.getElementById('val-speed').value);
    const pitch = parseFloat(document.getElementById('val-pitch').value);
    const selectedVoiceIdx = document.getElementById('voice-select').value;
    const pauseSec = parseInt(document.getElementById('pause-sec').value) * 1000;

    const trackInfo = document.getElementById('current-track');
    const display = document.getElementById('now-playing');

    // 【改良】通常の単一テキストデータ、または「問題のみ」モードの場合
    if (item.isTextOnly || mode === 'q') {
        trackInfo.innerText = item.isTextOnly ? "MODE: TEXT PLAYBACK" : "MODE: QUESTION ONLY";
        display.innerText = item.q;
        speakText(item.q, speed, pitch, selectedVoiceIdx, () => {
            timeoutId = setTimeout(speakLoop, pauseSec);
        });
    } else if (mode === 'a') {
        // クイズ形式データで「答えのみ」モード、かつ答えが存在する場合
        trackInfo.innerText = "MODE: ANSWER ONLY";
        display.innerText = item.a || "(答えデータなし)";
        speakText(item.a || "データなし", speed, pitch, selectedVoiceIdx, () => {
            timeoutId = setTimeout(speakLoop, pauseSec);
        });
    } else {
        // 通常の「問題 ➔ 答え」セットモード
        trackInfo.innerText = "MODE: SET (QUESTION)";
        display.innerText = item.q;
        
        speakText(item.q, speed, pitch, selectedVoiceIdx, () => {
            if (!isPlaying) return;
            
            timeoutId = setTimeout(() => {
                if (!isPlaying) return;
                trackInfo.innerText = "MODE: SET (ANSWER)";
                display.innerText = item.a;
                
                speakText(item.a, speed, pitch, selectedVoiceIdx, () => {
                    timeoutId = setTimeout(speakLoop, pauseSec);
                });
            }, 1000);
        });
    }
}

function speakText(text, speed, pitch, voiceIdx, callback) {
    synth.cancel();
    
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.rate = speed;
    utterance.pitch = pitch;
    
    if (voiceIdx !== "" && voices[voiceIdx]) {
        utterance.voice = voices[voiceIdx];
    }

    utterance.onend = () => {
        if (isPlaying && callback) callback();
    };

    utterance.onerror = (e) => {
        console.error("SpeechSynthesis error", e);
        if (isPlaying && callback) callback();
    };

    synth.speak(utterance);
}

if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
            .then(reg => console.log('Service Worker 登録成功:', reg.scope))
            .catch(err => console.error('Service Worker 登録失敗:', err));
    });
}
</script>
</body>
</html>
